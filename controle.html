<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Operacional - V4.1 Premium Black</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #000000;
            --bg-soft: #050505;
            --surface-glass: rgba(15, 15, 15, 0.55);
            --border-subtle: #1A1A1A;
            --border-highlight: #333333;
            --text-main: #FFFFFF;
            --text-sec: #888888;
            --text-dim: #444444;
            --glow-white: rgba(255, 255, 255, 0.1);
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            background-image: radial-gradient(var(--border-subtle) 1px, transparent 1px);
            background-size: 24px 24px;
            color: var(--text-main);
            padding: 30px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Overlay radial para focar o centro e escurecer as bordas */
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 30%, transparent 20%, #000000 100%);
            z-index: -1; pointer-events: none;
        }

        .grid-layout { width: 100%; max-width: 1040px; }

        /* Tipografia de Alto Contraste */
        h2 { 
            font-weight: 800;
            font-size: 1.4rem; 
            letter-spacing: -0.5px;
            margin-top: 0; margin-bottom: 25px;
            display: flex; align-items: center; gap: 12px;
            text-transform: uppercase;
        }
        h2 i { color: var(--text-main); text-shadow: 0 0 15px var(--glow-white); }

        .label-technical {
            font-weight: 300;
            font-size: 0.55rem;
            letter-spacing: 3px;
            color: var(--text-sec);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        /* Glassmorphism Premium */
        .glass-panel {
            background: var(--surface-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-subtle);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.02);
        }

        /* Status Header */
        .status-header { display: flex; gap: 15px; margin-bottom: 30px; width: 100%; max-width: 1040px; }
        
        .timer-card { 
            padding: 20px; 
            flex: 1; 
            text-align: center; 
            position: relative;
            display: flex; flex-direction: column; justify-content: center;
        }

        .timer-card::after {
            content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 30px; height: 1px; background: var(--text-main);
            box-shadow: 0 0 10px var(--text-main);
        }

        .clock-main { 
            font-family: 'Orbitron', monospace; 
            font-size: 1.8rem; 
            font-weight: 800; 
            color: var(--text-main);
            letter-spacing: -1px;
            text-shadow: 0 0 20px var(--glow-white);
        }

        /* Inputs Keyboard-First */
        .inputs-plantao { display: flex; flex-direction: column; gap: 10px; padding: 15px 20px; justify-content: center; }
        .input-group { display: flex; align-items: center; justify-content: space-between; gap: 15px;}
        input[type="time"] { 
            background: transparent; border: 1px solid var(--border-subtle); color: var(--text-main); 
            border-radius: 8px; padding: 6px 10px; font-family: 'Orbitron', monospace; font-size: 0.85rem; font-weight: 600;
            transition: var(--transition-smooth); outline: none;
        }
        input[type="time"]:focus { border-color: var(--text-sec); box-shadow: 0 0 15px var(--glow-white); background: rgba(255,255,255,0.05); }

        /* Lista e Cards */
        .card { padding: 30px; }

        .cf-item { 
            display: flex; align-items: center; 
            background: transparent; 
            border: 1px solid var(--border-subtle);
            margin-bottom: 8px; padding: 10px 20px; 
            border-radius: 12px; 
            transition: var(--transition-smooth);
            cursor: grab;
        }

        .cf-item:hover {
            border-color: var(--border-highlight);
            background: rgba(255, 255, 255, 0.02);
            transform: translateY(-1px);
        }

        /* Opacidade e Blur para estados vazios/arrastando */
        .cf-item.dragging { opacity: 0.2; filter: blur(2px); border: 1px dashed var(--text-sec); }
        .cf-item.empty-state { opacity: 0.2; filter: blur(0.5px); }

        .cf-item:first-child:not(.empty-state) { border-left: 2px solid var(--text-main); }
        
        .cf-rank { font-weight: 800; color: var(--text-dim); font-size: 1rem; width: 35px; }
        .cf-sigla-text { font-weight: 800; font-size: 1.1rem; width: 85px; color: var(--text-main); }
        .cf-exp { background: var(--bg-deep); padding: 4px 12px; border-radius: 6px; font-size: 0.8rem; font-family: 'Orbitron', monospace; margin-right: auto; border: 1px solid var(--border-subtle); color: var(--text-sec); }

        /* Contadores e Botões Táteis */
        .counter-group { 
            display: flex; align-items: center; gap: 6px; 
            background: transparent; 
            margin-right: 20px;
        }
        
        .counter-value { font-family: 'Orbitron', monospace; font-size: 1rem; min-width: 30px; text-align: center; font-weight: 800; }

        .btn-step, .btn-sigla {
            background: var(--bg-deep);
            border: 1px solid var(--border-subtle);
            color: var(--text-sec);
            cursor: pointer;
            transition: var(--transition-smooth);
            display: flex; justify-content: center; align-items: center;
        }

        .btn-step { width: 28px; height: 28px; border-radius: 8px; font-weight: 300; font-size: 1.2rem; }
        .btn-step:hover { color: var(--text-main); border-color: var(--text-main); transform: translateY(-2px); box-shadow: 0 4px 10px var(--glow-white); }
        .btn-step:active { transform: translateY(1px); box-shadow: none; }

        /* Botoeira Chips */
        .botoeira-container { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid var(--border-subtle); }
        .btn-sigla {
            padding: 8px 16px; border-radius: 20px; 
            font-size: 0.65rem; font-weight: 800; letter-spacing: 1px;
        }
        .btn-sigla:hover { background: var(--text-main); color: var(--bg-deep); transform: translateY(-2px); }
        .btn-sigla:active { transform: translateY(1px); }

        /* Grid de Janelas */
        .janelas-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-top: 20px; border-top: 1px solid var(--border-subtle); padding-top: 25px; }
        .janela-item { text-align: center; display: flex; flex-direction: column; gap: 5px; align-items: center; }

        .icon-btn { color: var(--text-dim); cursor: pointer; transition: var(--transition-smooth); font-size: 1.2rem; }
        .icon-btn:hover { color: var(--text-main); }

        /* Dopamine Particles */
        .particle {
            position: fixed;
            width: 3px; height: 3px;
            background: #FFFFFF;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            animation: explode 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes explode {
            0% { transform: scale(1) translate(0, 0); opacity: 1; box-shadow: 0 0 5px #fff; }
            100% { transform: scale(0) translate(var(--tx), var(--ty)); opacity: 0; }
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: var(--border-highlight); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-sec); }
    </style>
</head>
<body>

<div class="status-header">
    <div class="glass-panel timer-card">
        <div class="label-technical">Horário Atual</div>
        <div class="clock-main" id="relogio">00:00:00</div>
    </div>
    <div class="glass-panel timer-card">
        <div class="label-technical" id="labelDespacho">Próxima Janela</div>
        <div class="clock-main" id="timerDespacho">--:--</div>
    </div>
    <div class="glass-panel timer-card">
        <div class="label-technical">Fim do Plantão</div>
        <div class="clock-main" id="timerSaida">--:--</div>
    </div>
    <div class="glass-panel inputs-plantao">
        <div class="input-group">
            <span class="label-technical" style="margin:0">Login</span>
            <input type="time" id="entrada" class="nav-input" value="06:00" onchange="salvar()">
        </div>
        <div class="input-group">
            <span class="label-technical" style="margin:0">Logout</span>
            <input type="time" id="saida" class="nav-input" value="15:48" onchange="salvar()">
        </div>
    </div>
</div>

<div class="grid-layout">
    <div class="glass-panel card">
        <h2><i class="fa-solid fa-layer-group"></i> Centro de Controle</h2>
        <div id="botoeira" class="botoeira-container"></div>
        <ul id="cfContainer" style="list-style: none; padding: 0; margin: 0;"></ul>
        <div id="janelasGrid" class="janelas-grid"></div>
    </div>
</div>

<script>
    const configuracaoSiglas = [
        {s:"ES", h:"08:00"}, {s:"NO1", h:"06:00"}, {s:"MTP", h:"06:00"}, {s:"OE1", h:"06:00"},
        {s:"SU2", h:"06:00"}, {s:"NOF", h:"08:00"}, {s:"BX1", h:"07:00"}, {s:"NO2", h:"06:00"},
        {s:"NO3", h:"06:00"}, {s:"CZS", h:"06:00"}, {s:"SUF", h:"08:00"}, {s:"SEF", h:"08:00"},
        {s:"LGS", h:"08:00"}
    ];

    let escala = Array(7).fill({sigla: "---", exp: "--:--", rec: 0, ral: 0});
    let dragged = null;

    // --- UX: Sistema de Partículas (Dopamina) ---
    function fireParticles(x, y, amount) {
        for (let i = 0; i < amount; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            document.body.appendChild(particle);
            
            const angle = Math.random() * Math.PI * 2;
            const velocity = 30 + Math.random() * 50;
            const tx = Math.cos(angle) * velocity;
            const ty = Math.sin(angle) * velocity;
            
            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            particle.style.setProperty('--tx', `${tx}px`);
            particle.style.setProperty('--ty', `${ty}px`);
            
            setTimeout(() => particle.remove(), 600);
        }
    }

    function render() {
        const c = document.getElementById('cfContainer');
        c.innerHTML = "";
        escala.forEach((d, i) => {
            const isEmpty = d.sigla === "---";
            const li = document.createElement('li');
            li.className = `cf-item ${isEmpty ? 'empty-state' : ''}`;
            li.draggable = !isEmpty;
            
            li.innerHTML = `
                <div class="cf-rank">${(i+1).toString().padStart(2, '0')}</div>
                <div class="cf-sigla-text">${d.sigla}</div>
                <div class="cf-exp">${d.exp}</div>
                <div class="counter-group">
                    <span class="label-technical" style="margin:0 4px 0 0">REC</span>
                    <button class="btn-step" onclick="alterarValor(event, ${i}, 'rec', -1)">-</button>
                    <span class="counter-value" style="color: ${d.rec > 0 ? '#FFF' : '#444'}">${d.rec}</span>
                    <button class="btn-step" onclick="alterarValor(event, ${i}, 'rec', 1)">+</button>
                </div>
                <div class="counter-group">
                    <span class="label-technical" style="margin:0 4px 0 0">RAL</span>
                    <button class="btn-step" onclick="alterarValor(event, ${i}, 'ral', -1)">-</button>
                    <span class="counter-value" style="color: ${d.ral > 0 ? '#FFF' : '#444'}">${d.ral}</span>
                    <button class="btn-step" onclick="alterarValor(event, ${i}, 'ral', 1)">+</button>
                </div>
                <div>
                    <i class="fa-solid fa-xmark icon-btn" onclick="excluirCF(${i})"></i>
                </div>`;
            
            if(!isEmpty) {
                li.ondragstart = () => { dragged = i; li.classList.add('dragging'); };
                li.ondragover = (e) => e.preventDefault();
                li.ondrop = () => {
                    const temp = escala.splice(dragged, 1)[0];
                    escala.splice(i, 0, temp);
                    render();
                };
                li.ondragend = () => li.classList.remove('dragging');
            }
            c.appendChild(li);
        });
        salvar();
        setupKeyboardNavigation(); // Re-aplica navegação após renderizar
    }

    function alterarValor(e, idx, campo, delta) {
        if (escala[idx].sigla === "---") return;
        let v = parseInt(escala[idx][campo]) + delta;
        escala[idx][campo] = v < 0 ? 0 : v;
        
        // Feedback visual se incrementou
        if(delta > 0) {
            const rect = e.target.getBoundingClientRect();
            fireParticles(rect.left + rect.width/2, rect.top + rect.height/2, 8);
        }
        render();
    }

    function excluirCF(idx) {
        escala[idx] = {sigla: "---", exp: "--:--", rec: 0, ral: 0};
        render();
    }

    function update() {
        const agora = new Date();
        document.getElementById('relogio').innerText = agora.toLocaleTimeString('pt-BR');
        document.getElementById('timerSaida').innerText = calc(document.getElementById('saida').value);
        
        let displayDespacho = "--:--";
        let labelDespacho = "PRÓXIMA JANELA";
        let opacity = "1";

        for (let i=0; i<5; i++) {
            const hIni = document.getElementById(`di_${i}`).value;
            const hFim = document.getElementById(`df_${i}`).value;
            if(hIni && hFim) { 
                const tIni = calc(hIni); const tFim = calc(hFim);
                if(tIni !== "00:00:00") { displayDespacho = tIni; labelDespacho = `START JANELA ${i+1}`; break; } 
                else if (tFim !== "00:00:00") { displayDespacho = tFim; labelDespacho = `FIM DA JANELA ${i+1}`; opacity = "0.6"; break; }
            }
        }
        
        const el = document.getElementById('timerDespacho');
        el.innerText = displayDespacho; 
        el.style.opacity = opacity; 
        document.getElementById('labelDespacho').innerText = labelDespacho;
    }

    function calc(h) {
        if(!h) return "--:--"; 
        const [hh, mm] = h.split(':'); 
        const obj = new Date(); obj.setHours(hh, mm, 0);
        const diff = obj - new Date(); 
        return diff <= 0 ? "00:00:00" : new Date(diff).toISOString().substr(11, 8);
    }

    function salvar() {
        const data = { escala, entrada: document.getElementById('entrada').value, saida: document.getElementById('saida').value, despachos: Array.from(document.querySelectorAll('.d-in')).map(i => i.value) };
        localStorage.setItem('operacional_premium_bw', JSON.stringify(data));
    }

    function carregar() {
        const s = localStorage.getItem('operacional_premium_bw');
        if(s) {
            const d = JSON.parse(s); escala = d.escala; 
            document.getElementById('entrada').value = d.entrada; document.getElementById('saida').value = d.saida;
            const ins = document.querySelectorAll('.d-in'); d.despachos.forEach((v, i) => { if(ins[i]) ins[i].value = v; });
        }
        render();
    }

    // Montando a botoeira tátil
    const bt = document.getElementById('botoeira');
    configuracaoSiglas.forEach(obj => {
        const b = document.createElement('button'); b.className = 'btn-sigla'; b.innerText = obj.s;
        b.onclick = (e) => { 
            for(let i=0; i<7; i++){ 
                if(escala[i].sigla==="---"){
                    escala[i]={sigla:obj.s, exp:obj.h, rec:0, ral:0}; 
                    const rect = e.target.getBoundingClientRect();
                    fireParticles(rect.left + rect.width/2, rect.top + rect.height/2, 15); // Maior dopamina ao preencher
                    break;
                }
            } 
            render(); 
        };
        bt.appendChild(b);
    });

    // Montando Grid de Janelas
    const g = document.getElementById('janelasGrid');
    for(let i=0; i<5; i++){
        g.innerHTML += `
            <div class="janela-item">
                <span class="label-technical">Janela ${i+1}</span>
                <input type="time" id="di_${i}" class="nav-input d-in" onchange="salvar()" style="width:80px">
                <input type="time" id="df_${i}" class="nav-input d-in" onchange="salvar()" style="width:80px">
            </div>`;
    }

    // --- UX: Seamless Input (Keyboard-First) ---
    function setupKeyboardNavigation() {
        const inputs = Array.from(document.querySelectorAll('.nav-input'));
        inputs.forEach((input, index) => {
            // Remove listeners antigos para evitar duplicação
            input.removeEventListener('keydown', handleEnter);
            input.addEventListener('keydown', handleEnter);
            
            function handleEnter(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    input.blur(); // Salva/tira o foco do atual
                    const nextInput = inputs[index + 1];
                    if (nextInput) nextInput.focus();
                }
            }
        });
    }

    window.onload = () => { carregar(); setInterval(update, 1000); setupKeyboardNavigation(); };
</script>
</body>
</html>
