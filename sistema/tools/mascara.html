<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Máscaras Automáticas - Raycast Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Raycast Dark Mode Variables */
            --bg-app: #0D0D0D;
            --bg-surface: rgba(255, 255, 255, 0.04);
            --bg-surface-hover: rgba(255, 255, 255, 0.08);
            --border-subtle: rgba(255, 255, 255, 0.08);
            --border-focus: rgba(255, 255, 255, 0.2);
            --text-main: #EEEEEE;
            --text-secondary: #888888;
            --accent-red: #FF6B6B;
            
            /* Geometry */
            --radius-md: 8px;
            --radius-lg: 12px;
            
            /* Animation */
            --transition-smooth: all 0.2s ease;
        }

        body {
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-app);
            color: var(--text-main);
            padding: 2vh 4vw;
            height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden; 
        }

        h1, h2 {
            font-weight: 600;
            margin: 0;
            letter-spacing: -0.3px;
        }

        .header-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-main);
            flex-shrink: 0;
            width: 100%;
            max-width: 1300px;
        }

        .header-title i {
            color: var(--text-secondary);
        }

        .grid-layout {
            width: 100%;
            max-width: 1300px;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            grid-template-rows: min-content 1fr;
            gap: 24px;
            flex-grow: 1;
            height: calc(100% - 70px);
        }

        .card-operador { grid-column: 1; grid-row: 1; }
        .card-adicionar { grid-column: 1; grid-row: 2; display: flex; flex-direction: column;}
        .card-mascaras { 
            grid-column: 2; 
            grid-row: 1 / span 2; 
            display: flex; 
            flex-direction: column;
        }

        .card { 
            background: var(--bg-surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg); 
            padding: 24px; 
            box-shadow: 0 4px 24px rgba(0,0,0,0.2);
            transition: var(--transition-smooth);
            display: flex;
            flex-direction: column;
        }

        .card.inactive-blur {
            opacity: 0.5;
            filter: blur(2px);
            pointer-events: none;
            transform: scale(0.99);
        }

        .card h2 {
            font-size: 0.95rem;
            color: var(--text-main);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .card h2 i {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .input-group { margin-bottom: 16px; width: 100%; }
        
        .input-group label { 
            display: block; 
            font-size: 0.75rem; 
            color: var(--text-secondary); 
            font-weight: 500; 
            margin-bottom: 8px; 
        }
        
        input[type="text"], textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-subtle);
            color: var(--text-main);
            border-radius: var(--radius-md);
            padding: 12px 14px;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            font-size: 0.9rem;
            box-sizing: border-box;
            transition: var(--transition-smooth);
        }
        
        input[type="text"]:focus, textarea:focus { 
            outline: none; 
            border-color: var(--border-focus); 
            background: rgba(255, 255, 255, 0.02);
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.05);
        }

        textarea { height: 80px; resize: none; line-height: 1.4; }

        .user-input-box { text-transform: uppercase; font-weight: 500 !important; }

        .preview-display {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-subtle);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.85rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            word-break: break-all;
        }

        .chips-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
            flex-grow: 1;
            align-content: flex-start;
            overflow-y: auto;
            padding-right: 4px;
        }

        .chip {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            display: inline-flex;
            align-items: stretch;
            font-size: 0.8rem;
            font-weight: 400;
            transition: var(--transition-smooth);
            user-select: none;
            height: fit-content;
            overflow: hidden;
        }

        .chip-text {
            padding: 8px 12px;
            color: var(--text-main);
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .chip-delete {
            padding: 8px 10px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
            border-left: 1px solid transparent;
        }

        .chip:hover {
            background: var(--bg-surface-hover);
            border-color: var(--border-focus);
        }

        .chip:hover .chip-delete {
            border-left-color: var(--border-subtle);
        }
        
        .chip-delete:hover { 
            color: var(--accent-red) !important; 
            background: rgba(255, 107, 107, 0.1);
        }

        .chip.active {
            background: var(--text-main);
            border-color: var(--text-main);
        }

        .chip.active .chip-text, .chip.active .chip-delete {
            color: var(--bg-app);
            font-weight: 500;
        }

        .btn {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            color: var(--text-main);
            padding: 10px 16px;
            border-radius: var(--radius-md);
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition-smooth);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .btn:hover { 
            background: var(--bg-surface-hover); 
            border-color: var(--border-focus);
        }
        
        .btn:active { 
            transform: scale(0.98); 
        }

        .btn-action { 
            background: rgba(255, 255, 255, 0.1); 
            border-color: var(--border-focus); 
        }
        
        .btn-action:hover { 
            background: rgba(255, 255, 255, 0.15); 
        }

        .particle {
            position: fixed;
            pointer-events: none;
            width: 4px;
            height: 4px;
            background: var(--text-main);
            border-radius: 50%;
            z-index: 9999;
            animation: explode 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes explode {
            0% { transform: scale(1) translate(0, 0); opacity: 1; }
            100% { transform: scale(0) var(--translate-end); opacity: 0; }
        }

        .row-flex {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            margin-top: auto; 
        }

        .history-box { 
            margin-top: 24px; 
            padding-top: 16px;
            border-top: 1px solid var(--border-subtle);
            font-size: 0.75rem; 
            color: var(--text-secondary); 
            font-weight: 400;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .history-item { 
            color: var(--text-main); 
            font-family: ui-monospace, monospace;
            font-size: 0.75rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }
    </style>
</head>
<body>

<div class="header-title">
    <i class="fa-solid fa-mask"></i> Máscaras
</div>

<div class="grid-layout" id="mainGrid">
    
    <div class="card card-operador">
        <h2><i class="fa-solid fa-user"></i> Operador & Base</h2>
        
        <div class="input-group">
            <label>Nome do Analista</label>
            <input type="text" id="userName" class="user-input-box" placeholder="Digite seu nome" oninput="salvarNome(); atualizarPreview()">
        </div>

        <div class="input-group" style="margin-bottom: 0;">
            <label>Visualização da Máscara</label>
            <div class="preview-display">
                <span id="baseMaskPreview">@@ DD/MM HH:MM NOME:</span>
                <button class="btn btn-action" id="btnCopiarVazia" onclick="copiarVazia(event)" style="padding: 8px 12px;">
                    <i class="fa-regular fa-copy"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="card card-mascaras">
        <h2><i class="fa-solid fa-bolt"></i> Máscaras Rápidas</h2>
        
        <label style="font-size: 0.75rem; color: var(--text-secondary); font-weight: 400; margin-bottom: 12px; display: block;">
            Clique em um item para copiar instantaneamente
        </label>
        
        <div class="chips-container" id="chipContainer">
            </div>

        <div class="input-group">
            <label>Texto Personalizado</label>
            <textarea id="customText" placeholder="Digite o complemento da nota aqui..."></textarea>
        </div>
        
        <div style="display: flex; gap: 12px;">
            <button class="btn btn-action" id="btnCopiarCustom" onclick="copiarCustomizada(event)" style="flex-grow: 1;">
                <i class="fa-solid fa-paste"></i> Copiar com Texto
            </button>
            <button class="btn" onclick="limparCustom()">
                <i class="fa-solid fa-eraser"></i> Limpar
            </button>
        </div>

        <div class="history-box">
            <span>Último copiado:</span>
            <span class="history-item" id="lastCopied">Nenhum</span>
        </div>
    </div>

    <div class="card card-adicionar">
        <h2><i class="fa-solid fa-plus"></i> Nova Variação</h2>
        <div class="input-group" style="flex-grow: 1;">
            <input type="text" id="newVariation" placeholder="Cole aqui o novo complemento...">
        </div>
        <button class="btn" onclick="adicionarVariacao(event)" style="width: 100%;">
            Adicionar à lista
        </button>
    </div>

</div>

<script>
    const variacoesPadrao = [
        "EQUIPE DE FIBRA ACIONADA - EM DESLOCAMENTO AO _ PARA REALIZAR TESTES.",
        "TODAS AS EQUIPES ESTÃO ACIONADAS NO MOMENTO - ATIVIDADE EM FILA, AGUARDANDO DISPONIBILIDADE TECNICA.",
        "CLIENTE INFORMA QUE EQUIPAMENTO ESTÁ DESLIGADO - FEITO TESTE DE ENERGIA."
    ];

    let variacoes = JSON.parse(localStorage.getItem('minhas_variacoes_bw')) || variacoesPadrao;

    function init() {
        const nomeSalvo = localStorage.getItem('usuario_nome_bw');
        if (nomeSalvo) document.getElementById('userName').value = nomeSalvo;

        atualizarChips();
        atualizarPreview();
        
        setInterval(atualizarPreview, 1000);
        configurarKeyboardFirst();
    }

    function configurarKeyboardFirst() {
        document.getElementById('customText').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                copiarCustomizada({ clientX: window.innerWidth / 2, clientY: window.innerHeight / 2 });
            }
        });

        document.getElementById('newVariation').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                adicionarVariacao({ clientX: window.innerWidth / 2, clientY: window.innerHeight / 2 });
            }
        });
    }

    function salvarNome() {
        const nome = document.getElementById('userName').value.toUpperCase();
        localStorage.setItem('usuario_nome_bw', nome);
    }

    function obterHorarioArredondado() {
        const agora = new Date();
        let minutos = agora.getMinutes();
        let horas = agora.getHours();
        
        let resto = minutos % 5;
        if (resto !== 0) minutos += (5 - resto);
        if (minutos >= 60) { minutos = 0; horas += 1; }
        if (horas >= 24) horas = 0;

        const dia = String(agora.getDate()).padStart(2, '0');
        const mes = String(agora.getMonth() + 1).padStart(2, '0');
        const hh = String(horas).padStart(2, '0');
        const mm = String(minutos).padStart(2, '0');

        return `@@ ${dia}/${mes} ${hh}:${mm}`;
    }

    function gerarMascaraBase() {
        const nome = document.getElementById('userName').value.toUpperCase() || "NOME";
        const tempo = obterHorarioArredondado();
        return `${tempo} ${nome}:`;
    }

    function atualizarPreview() {
        document.getElementById('baseMaskPreview').innerText = gerarMascaraBase();
    }

    function dispararParticulas(x, y, intensidade = 15) {
        for (let i = 0; i < intensidade; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            document.body.appendChild(particle);
            
            const angle = Math.random() * Math.PI * 2;
            const velocity = Math.random() * 60 + 20; 
            const tx = Math.cos(angle) * velocity;
            const ty = Math.sin(angle) * velocity;
            
            particle.style.left = `${x}px`;
            particle.style.top = `${y}px`;
            particle.style.setProperty('--translate-end', `${tx}px, ${ty}px`);
            
            setTimeout(() => particle.remove(), 500);
        }
    }

    function aplicarDesfoqueTemporario() {
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => card.classList.add('inactive-blur'));
        setTimeout(() => cards.forEach(card => card.classList.remove('inactive-blur')), 200);
    }

    function animarElemento(elId, textoOriginal) {
        if (!elId) return;
        const el = document.getElementById(elId);
        el.innerHTML = `<i class="fa-solid fa-check"></i>`;
        setTimeout(() => el.innerHTML = textoOriginal, 1200);
    }

    function executarCopia(textoFinal, elId, event, textoOriginal, intensidadeParticulas, isChip = false) {
        navigator.clipboard.writeText(textoFinal).then(() => {
            const lastCopiedEl = document.getElementById('lastCopied');
            if(lastCopiedEl) lastCopiedEl.innerText = textoFinal;
            
            const x = event.clientX || event.target.getBoundingClientRect().left;
            const y = event.clientY || event.target.getBoundingClientRect().top;
            
            dispararParticulas(x, y, intensidadeParticulas);
            aplicarDesfoqueTemporario();
            
            if (elId) animarElemento(elId, textoOriginal);
            
            if (isChip) {
                const chip = event.target.closest('.chip');
                chip.classList.add('active');
                const chipText = chip.querySelector('.chip-text');
                const oldText = chipText.innerText;
                chipText.innerHTML = `<i class="fa-solid fa-check"></i> Copiado`;
                
                setTimeout(() => {
                    chip.classList.remove('active');
                    chipText.innerText = oldText;
                }, 1000);
            }
        });
    }

    function copiarVazia(event) {
        const texto = gerarMascaraBase() + " ";
        executarCopia(texto, 'btnCopiarVazia', event, '<i class="fa-regular fa-copy"></i>', 10);
    }

    function copiarCustomizada(event) {
        const custom = document.getElementById('customText').value.trim();
        const texto = `${gerarMascaraBase()} ${custom}`;
        executarCopia(texto, 'btnCopiarCustom', event, '<i class="fa-solid fa-paste"></i> Copiar com Texto', 30);
    }

    function limparCustom() {
        document.getElementById('customText').value = "";
        document.getElementById('customText').focus();
    }

    function copiarDoChip(valor, event) {
        const texto = `${gerarMascaraBase()} ${valor}`;
        executarCopia(texto, null, event, null, 20, true);
    }

    function deletarVariacao(index, event) {
        event.stopPropagation();
        variacoes.splice(index, 1);
        localStorage.setItem('minhas_variacoes_bw', JSON.stringify(variacoes));
        atualizarChips();
    }

    function atualizarChips() {
        const container = document.getElementById('chipContainer');
        container.innerHTML = '';

        variacoes.forEach((v, index) => {
            const chip = document.createElement('div');
            chip.className = 'chip';
            chip.title = v;

            const textoExibicao = v.length > 35 ? v.substring(0, 35) + '...' : v;

            const spanText = document.createElement('span');
            spanText.className = 'chip-text';
            spanText.innerText = textoExibicao;
            spanText.onclick = (e) => copiarDoChip(v, e);

            const spanDelete = document.createElement('span');
            spanDelete.className = 'chip-delete';
            spanDelete.innerHTML = '<i class="fa-solid fa-xmark"></i>';
            spanDelete.onclick = (e) => deletarVariacao(index, e);

            chip.appendChild(spanText);
            chip.appendChild(spanDelete);
            container.appendChild(chip);
        });
    }

    function adicionarVariacao(event) {
        const input = document.getElementById('newVariation');
        const nova = input.value.trim().toUpperCase();
        if (nova) {
            variacoes.push(nova);
            localStorage.setItem('minhas_variacoes_bw', JSON.stringify(variacoes));
            input.value = "";
            atualizarChips();
            
            const x = event.clientX || event.target.getBoundingClientRect().left;
            const y = event.clientY || event.target.getBoundingClientRect().top;
            dispararParticulas(x, y, 15);
        }
    }

    window.onload = init;
</script>
</body>
</html>
