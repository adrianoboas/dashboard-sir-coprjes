<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centralizador Pessoal</title>
    <style>
        /* Reset e Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
        }

        /* Container Principal */
        .container {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            padding: 20px;
            max-width: 900px;
            animation: fadeIn 1.5s ease-in-out;
        }

        /* 1. Título do Sistema */
        .brand {
            font-size: clamp(3rem, 10vw, 6rem); /* Responsivo e impactante */
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        /* 2. Data e Hora */
        .clock-container {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        #time {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 300;
            color: #fff;
        }

        #date {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #888; /* Cinza claro para respiro */
        }

        /* 3. Frase Motivacional */
        .quote-container {
            margin-top: 1rem;
            border-top: 1px solid #222;
            padding-top: 2rem;
        }

        #quote {
            font-size: 1.2rem;
            font-style: italic;
            color: #ccc;
            line-height: 1.6;
            max-width: 600px;
            margin: 0 auto;
        }

        #author {
            display: block;
            margin-top: 10px;
            font-size: 0.9rem;
            font-weight: 700;
            color: #555;
            text-transform: uppercase;
        }

        /* Animação de entrada */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .container { gap: 1.5rem; }
            #date { letter-spacing: 2px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <main class="container">
        <h1 class="brand" id="system-name">CENTRAL</h1>

        <div class="clock-container">
            <div id="time">00:00:00</div>
            <div id="date">Carregando data...</div>
        </div>

        <div class="quote-container">
            <p id="quote">"Sozinhos vamos mais rápido, juntos vamos mais longe.”</p>
  
        </div>
    </main>

    <script>
        // Configurações Simples
        const systemName = "COP REDE FIBRA EMP RJ/ES"; 
        document.getElementById('system-name').innerText = systemName;

        const quotes = [
            "Sozinhos vamos mais rápido, juntos vamos mais longe.",
            "O talento vence jogos, mas só o trabalho em equipe ganha campeonatos.",
            "Nenhum de nós é tão bom quanto todos nós juntos.",

        ];

        // Função para atualizar Relógio e Data
        function updateClock() {
            const now = new Date();
            
            // Hora (Formato Brasileiro)
            const timeString = now.toLocaleTimeString('pt-BR', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            
            // Data (Formato Brasileiro)
            const dateOptions = { day: 'numeric', month: 'long', year: 'numeric' };
            const dateString = now.toLocaleDateString('pt-BR', dateOptions);

            document.getElementById('time').textContent = timeString;
            document.getElementById('date').textContent = dateString;
        }

        // Função para rotacionar frase (opcional - muda a cada carregamento)
        function setRandomQuote() {
            const randomIndex = Math.floor(Math.random() * quotes.length);
            document.getElementById('quote').textContent = `"${quotes[randomIndex]}"`;
        }

        // Inicialização
        setInterval(updateClock, 1000);
        updateClock();
        setRandomQuote();
    </script>
</body>
</html>
