<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Consulta de Endereços | Padrão UX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050505;
            --surface-glass: rgba(26, 26, 26, 0.4);
            --border-dark: #222222;
            --text-primary: #FFFFFF;
            --text-secondary: #888888;
            --transition-smooth: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Reset e Base */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            /* Textura discreta de pontos */
            background-image: radial-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px);
            background-size: 24px 24px;
            color: var(--text-primary);
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Canvas de Partículas (Feedback de Dopamina) */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 9999;
        }

        /* Tipografia de Alto Contraste */
        .header-title {
            font-weight: 800;
            font-size: 2rem;
            color: var(--text-primary);
            letter-spacing: -0.02em;
            margin-bottom: 40px;
            text-align: center;
            text-transform: uppercase;
        }

        .support-text {
            font-weight: 300;
            font-size: 0.75rem;
            color: var(--text-secondary);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* Container e Glassmorphism */
        .container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .card {
            background: var(--surface-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-dark);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
            transition: var(--transition-smooth);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            font-size: 1rem;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-dark);
        }

        .card-header i {
            color: var(--text-primary);
        }

        /* Input Seamless (Keyboard-First) */
        .search-container {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }

        .search-input {
            flex-grow: 1;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-dark);
            color: var(--text-primary);
            border-radius: 12px;
            padding: 18px 24px;
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            font-size: 1rem;
            letter-spacing: 0.05em;
            transition: var(--transition-smooth);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--text-primary);
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05);
        }

        .search-input::placeholder {
            color: #444444;
        }

        /* Botão Tátil */
        .btn-search {
            background: var(--text-primary);
            color: var(--bg-deep);
            border: none;
            padding: 0 32px;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            cursor: pointer;
            text-transform: uppercase;
            transition: var(--transition-smooth);
            /* Efeito de profundidade física */
            box-shadow: 0 6px 0 var(--text-secondary);
            transform: translateY(0);
        }

        .btn-search:hover {
            background: #E0E0E0;
        }

        .btn-search:active {
            /* Botão "afunda" ao clicar */
            box-shadow: 0 0px 0 var(--text-secondary);
            transform: translateY(6px);
        }

        /* Inativo/Erro State */
        .input-error {
            opacity: 0.5;
            filter: blur(1px);
        }

        /* Wrapper do Mapa */
        .map-wrapper {
            width: 100%;
            height: 500px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-dark);
            background: #000;
            position: relative;
        }

        .map-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            /* Filtro rigoroso B&W para o iframe */
            filter: grayscale(100%) contrast(1.1) brightness(0.8) opacity(0.7);
            transition: var(--transition-smooth);
        }

        .map-wrapper iframe:hover {
            filter: grayscale(0%) contrast(1) brightness(1) opacity(1);
        }

        /* Scrollbar Minimalista */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: var(--border-dark); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

    </style>
</head>
<body>

<canvas id="particle-canvas"></canvas>

<div class="header-title">
    Consulta de Endereços <span style="font-weight: 300; font-size: 0.8rem; display: block; margin-top: 8px; color: var(--text-secondary); letter-spacing: 0.2em;">Sistema em Construção</span>
</div>

<div class="container">
    <div class="card">
        <div class="card-header">
            <i class="fa-solid fa-satellite-dish"></i> 
            SIGLA ESTAÇÃO / SITE
        </div>
        
        <div class="search-container">
            <input type="text" id="enderecoBusca" class="search-input" placeholder="Insira o endereço alvo..." onkeypress="buscarComEnter(event)">
            <button class="btn-search" id="btnSearch" onclick="buscarNoMaps(event)">
                Buscar
            </button>
        </div>

        <div class="map-wrapper">
            <iframe src="https://maps.google.com/maps?q=Brasil&t=&z=4&ie=UTF8&iwloc=&output=embed" allowfullscreen="" loading="lazy"></iframe>
        </div>
        
        <div style="text-align: right; margin-top: 16px;">
            <span class="support-text">Passe o mouse sobre o mapa para remover o filtro monocromático.</span>
        </div>
    </div>
</div>

<script>
    // Foco automático para input seamless (Keyboard-first)
    document.addEventListener("DOMContentLoaded", () => {
        document.getElementById('enderecoBusca').focus();
    });

    // Função de Busca Principal
    function buscarNoMaps(event) {
        const input = document.getElementById('enderecoBusca');
        const endereco = input.value.trim();
        
        if(endereco !== "") {
            // Sucesso: Dispara dopamina (partículas) na posição do botão ou centro da tela
            let rect = document.getElementById('btnSearch').getBoundingClientRect();
            let x = event ? event.clientX : rect.left + rect.width / 2;
            let y = event ? event.clientY : rect.top + rect.height / 2;
            
            triggerParticles(x, y);
            
            input.classList.remove('input-error');
            const url = `https://maps.google.com/maps?q=${encodeURIComponent(endereco)}`;
            
            // Aguarda a animação da partícula brevemente antes de abrir a aba
            setTimeout(() => {
                window.open(url, '_blank');
                // Mantém o foco no input após a ação para fluxo contínuo
                input.focus(); 
            }, 300);
            
        } else {
            // Falha: Aplica desfoque e redução de opacidade temporária
            input.classList.add('input-error');
            setTimeout(() => input.classList.remove('input-error'), 800);
        }
    }

    // Input Seamless via teclado
    function buscarComEnter(event) {
        if (event.key === "Enter") {
            buscarNoMaps(null);
        }
    }

    // --- SISTEMA DE PARTÍCULAS (FEEDBACK DE DOPAMINA) ---
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particlesArray = [];

    class Particle {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.size = Math.random() * 3 + 1;
            this.speedX = Math.random() * 6 - 3;
            this.speedY = Math.random() * 6 - 3;
            this.color = Math.random() > 0.5 ? '#FFFFFF' : '#888888';
            this.life = 1.0;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.life -= 0.02; // Velocidade de desaparecimento
        }
        draw() {
            ctx.fillStyle = `rgba(${this.color === '#FFFFFF' ? '255,255,255' : '136,136,136'}, ${this.life})`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function triggerParticles(x, y) {
        // Quantidade de partículas baseada na prioridade (alta = 40)
        for (let i = 0; i < 40; i++) {
            particlesArray.push(new Particle(x, y));
        }
    }

    function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < particlesArray.length; i++) {
            particlesArray[i].update();
            particlesArray[i].draw();
            if (particlesArray[i].life <= 0) {
                particlesArray.splice(i, 1);
                i--;
            }
        }
        requestAnimationFrame(animateParticles);
    }
    
    animateParticles();

    // Redimensionamento responsivo do canvas
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
</script>

</body>
</html>
