<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartNotes | System v2.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #000000;
            --bg-surface: #050505;
            --border-subtle: #1A1A1A;
            --border-strong: #222222;
            --text-primary: #FFFFFF;
            --text-secondary: #888888;
            --glass: rgba(255, 255, 255, 0.03);
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            background-color: var(--bg-deep);
            background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-primary);
            overflow: hidden; 
        }

        /* --- SIDEBAR --- */
        #sidebar { 
            width: 280px; 
            background: var(--glass); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-subtle); 
            display: flex; 
            flex-direction: column; 
            z-index: 10;
        }

        .sidebar-header { 
            padding: 40px 25px;
        }

        .sidebar-header h2 {
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .main-actions { padding: 0 20px 20px; display: grid; gap: 8px; }
        
        /* Botões Táteis */
        .btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 12px; border-radius: 12px; font-weight: 800;
            cursor: pointer; transition: var(--transition); font-size: 0.7rem; 
            text-transform: uppercase; letter-spacing: 0.1em; border: 1px solid var(--border-strong);
        }
        
        .btn-primary { 
            background: #FFFFFF; 
            color: #000; 
        }
        .btn-primary:hover { 
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255,255,255,0.1);
        }
        .btn-primary:active { transform: translateY(1px); }
        
        .btn-outline { 
            background: transparent; 
            color: var(--text-primary); 
        }
        .btn-outline:hover { 
            background: rgba(255,255,255,0.05);
            border-color: #444;
        }

        /* Listas */
        #folder-list { flex-grow: 1; overflow-y: auto; padding: 20px; }
        
        .folder-header { 
            display: flex; align-items: center; padding: 12px; border-radius: 8px; 
            font-weight: 800; font-size: 0.75rem; color: var(--text-primary); cursor: pointer;
            transition: var(--transition); text-transform: uppercase; letter-spacing: 0.05em;
        }
        .folder-header:hover { background: var(--glass); }
        
        .folder-arrow { transition: var(--transition); margin-right: 10px; color: var(--text-secondary); }
        .folder-arrow.open { transform: rotate(90deg); color: #fff; }

        .folder-actions { margin-left: auto; display: flex; gap: 8px; opacity: 0; }
        .folder-header:hover .folder-actions { opacity: 1; }

        .notes-container { margin-left: 18px; border-left: 1px solid var(--border-subtle); padding-left: 10px; }
        .notes-container.collapsed { display: none; }

        .note-item {
            padding: 10px 15px; margin: 2px 0; border-radius: 8px;
            cursor: pointer; color: var(--text-secondary); font-size: 0.8rem; font-weight: 300;
            transition: var(--transition);
        }
        .note-item:hover { color: #fff; background: rgba(255,255,255,0.03); }
        .note-item.active { 
            background: #fff;
            color: #000;
            font-weight: 800;
        }

        /* --- EDITOR --- */
        #editor-container { 
            flex-grow: 1; display: flex; flex-direction: column; 
            padding: 80px 10%; background: var(--bg-surface);
        }
        
        #note-title { 
            width: 100%; font-size: 3rem; font-weight: 800; border: none; outline: none; 
            margin-bottom: 30px; background: transparent; color: var(--text-primary); 
            letter-spacing: -0.04em;
        }
        
        #note-content { 
            flex-grow: 1; width: 100%; font-size: 1rem; line-height: 1.8; border: none; outline: none; 
            resize: none; background: transparent; color: var(--text-secondary); 
            font-weight: 300; letter-spacing: 0.02em;
        }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(10px);
        }
        .modal { 
            background: #0A0A0A; border: 1px solid var(--border-strong);
            padding: 40px; border-radius: 24px; width: 400px; 
            box-shadow: 0 40px 100px rgba(0,0,0,1);
        }
        
        .modal-input { 
            width: 100%; padding: 15px; border: 1px solid var(--border-strong); 
            background: #000; color: #fff; border-radius: 12px; margin: 25px 0; 
            box-sizing: border-box; font-family: 'Inter', sans-serif; transition: var(--transition);
        }
        .modal-input:focus { outline: none; border-color: #fff; }

        .btn-icon { background: transparent; border: none; cursor: pointer; color: var(--text-secondary); padding: 5px; transition: var(--transition); }
        .btn-icon:hover { color: #fff; transform: scale(1.1); }

        /* Concluídos/Inativos */
        .item-inactive { opacity: 0.2; filter: blur(1px); pointer-events: none; }

        /* Canvas para Partículas */
        #particle-canvas {
            position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 10px; }
    </style>
</head>
<body>

<canvas id="particle-canvas"></canvas>

<div id="modal-overlay" class="modal-overlay">
    <div id="modal" class="modal">
        <div id="modal-title" style="font-weight:800; font-size: 1.2rem; text-transform: uppercase;">Ação do Sistema</div>
        <input type="text" id="modal-input" class="modal-input" autocomplete="off">
        <div style="display:flex; gap:12px">
            <button class="btn btn-outline" style="flex:1" onclick="closeModal()">Cancelar</button>
            <button id="modal-confirm" class="btn btn-primary" style="flex:1">Confirmar</button>
        </div>
    </div>
</div>

<div id="sidebar">
    <div class="sidebar-header">
        <h2><i data-lucide="layers"></i> SmartNotes</h2>
    </div>
    
    <div class="main-actions">
        <button class="btn btn-primary" onclick="openModal('Nova Pasta', 'NOME DA PASTA', createFolder)">
            <i data-lucide="plus" size="14"></i> Criar Pasta
        </button>
        <button class="btn btn-outline" onclick="exportToZip()">
            <i data-lucide="download" size="14"></i> Backup ZIP
        </button>
    </div>

    <div id="folder-list"></div>
</div>

<div id="editor-container">
    <div id="editor-view" style="display:none; height:100%; flex-direction:column;">
        <input type="text" id="note-title" placeholder="Título da Nota" oninput="saveCurrentNote()">
        <textarea id="note-content" placeholder="Comece a escrever..." oninput="saveCurrentNote()"></textarea>
    </div>
    <div id="empty-view" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; text-align:center;">
        <i data-lucide="cpu" size="40" style="color: var(--border-strong); margin-bottom: 20px;"></i>
        <p style="font-weight:800; font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.3em;">Aguardando Seleção</p>
    </div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('smartnotes_black_white')) || [];
    let currentNoteRef = null;
    let modalAction = null;

    // --- SISTEMA DE PARTÍCULAS (FEEDBACK DE DOPAMINA) ---
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.size = Math.random() * 3 + 1;
            this.speedX = (Math.random() - 0.5) * 8;
            this.speedY = (Math.random() - 0.5) * 8;
            this.opacity = 1;
        }
        update() {
            this.x += this.speedX; this.y += this.speedY;
            this.opacity -= 0.02;
        }
        draw() {
            ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function triggerSuccess(e) {
        const x = e ? e.clientX : window.innerWidth / 2;
        const y = e ? e.clientY : window.innerHeight / 2;
        for(let i=0; i<20; i++) particles.push(new Particle(x, y));
    }

    function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles = particles.filter(p => p.opacity > 0);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animateParticles);
    }
    animateParticles();

    // --- LÓGICA CORE ---
    async function exportToZip() {
        if (data.length === 0) return;
        const zip = new JSZip();
        data.forEach(folder => {
            const folderZip = zip.folder(folder.name);
            folder.notes.forEach(note => {
                folderZip.file(`${note.title || "Sem Titulo"}.txt`, note.content || "");
            });
        });
        const content = await zip.generateAsync({type: "blob"});
        saveAs(content, `BACKUP_${new Date().getTime()}.zip`);
        triggerSuccess();
    }

    function openModal(title, placeholder, callback) {
        document.getElementById('modal-title').innerText = title;
        const input = document.getElementById('modal-input');
        input.placeholder = placeholder;
        input.value = '';
        modalAction = callback;
        document.getElementById('modal-overlay').style.display = 'flex';
        input.focus();
    }

    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

    document.getElementById('modal-confirm').onclick = (e) => {
        const val = document.getElementById('modal-input').value.trim();
        if(val) {
            modalAction(val);
            triggerSuccess(e);
        }
        closeModal();
    };

    document.getElementById('modal-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('modal-confirm').click();
    });

    function createFolder(name) { 
        data.push({ name, isOpen: true, notes: [] }); 
        saveAndRender(); 
    }

    function toggleFolder(idx) {
        data[idx].isOpen = !data[idx].isOpen;
        saveAndRender();
    }

    function createNote(fIdx, name, e) {
        e.stopPropagation();
        data[fIdx].notes.push({ title: name, content: "" });
        data[fIdx].isOpen = true;
        saveAndRender();
        loadNote(fIdx, data[fIdx].notes.length - 1);
    }

    function loadNote(fIdx, nIdx) {
        currentNoteRef = { fIdx, nIdx };
        const note = data[fIdx].notes[nIdx];
        document.getElementById('empty-view').style.display = 'none';
        document.getElementById('editor-view').style.display = 'flex';
        document.getElementById('note-title').value = note.title;
        document.getElementById('note-content').value = note.content;
        render();
    }

    function saveCurrentNote() {
        if (!currentNoteRef) return;
        const { fIdx, nIdx } = currentNoteRef;
        data[fIdx].notes[nIdx].title = document.getElementById('note-title').value;
        data[fIdx].notes[nIdx].content = document.getElementById('note-content').value;
        localStorage.setItem('smartnotes_black_white', JSON.stringify(data));
        
        const el = document.querySelector(`.note-item[data-f="${fIdx}"][data-n="${nIdx}"]`);
        if (el) el.innerText = data[fIdx].notes[nIdx].title || "Sem título";
    }

    function deleteFolder(idx, e) {
        e.stopPropagation();
        data.splice(idx, 1);
        currentNoteRef = null;
        document.getElementById('editor-view').style.display = 'none';
        document.getElementById('empty-view').style.display = 'flex';
        saveAndRender();
    }

    function saveAndRender() { 
        localStorage.setItem('smartnotes_black_white', JSON.stringify(data)); 
        render(); 
    }

    function render() {
        const list = document.getElementById('folder-list');
        list.innerHTML = '';
        data.forEach((folder, fIdx) => {
            const group = document.createElement('div');
            group.innerHTML = `
                <div class="folder-header" onclick="toggleFolder(${fIdx})">
                    <i data-lucide="chevron-right" class="folder-arrow ${folder.isOpen ? 'open' : ''}" size="14"></i>
                    <span style="flex:1">${folder.name}</span>
                    <div class="folder-actions">
                        <button class="btn-icon" onclick="openModal('Nova Nota', 'NOME DA NOTA', (v) => createNote(${fIdx}, v, event))"><i data-lucide="plus-circle" size="14"></i></button>
                        <button class="btn-icon" onclick="deleteFolder(${fIdx}, event)"><i data-lucide="x" size="14"></i></button>
                    </div>
                </div>
                <div class="notes-container ${folder.isOpen ? '' : 'collapsed'}">
                    ${folder.notes.map((note, nIdx) => {
                        const isActive = currentNoteRef?.fIdx === fIdx && currentNoteRef?.nIdx === nIdx;
                        return `<div class="note-item ${isActive ? 'active' : ''}" data-f="${fIdx}" data-n="${nIdx}" onclick="loadNote(${fIdx}, ${nIdx})">
                            ${note.title || "Sem título"}
                        </div>`;
                    }).join('')}
                </div>
            `;
            list.appendChild(group);
        });
        lucide.createIcons();
    }

    render();
</script>
</body>
</html>
