<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>NEXUS - CENTRALIZADOR</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="https://www.gstatic.com/lamda/images/gemini_sparkle_aurora_33f86dc0c0257da337c63.svg" sizes="any" type="image/svg+xml">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --pure-black: #000000;
            --pure-white: #ffffff;
            --icon-idle: rgba(255, 255, 255, 0.4);
            --border-white: rgba(255, 255, 255, 0.15);
            --transition-premium: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100vw;
            height: 100vh;
            background: var(--pure-black);
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        .main-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block; 
            background: var(--pure-black);
        }

        /* DOCK ESTILO PÍLULA PREMIER */
        .dock-wrapper {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            width: min(100%, 100vw);
            z-index: 9999;
            pointer-events: none;
        }

        .dock-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 6px;
            padding: 10px 12px;
            background: var(--pure-black);
            border: 1px solid var(--border-white);
            border-radius: 50px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.9);
            transition: transform 0.4s ease, opacity 0.3s ease;
            transform: translateY(0);
            pointer-events: auto;
            max-width: min(calc(100vw - 36px), 980px);
        }

        .dock-wrapper.hidden .dock-container {
            transform: translateY(120%);
            opacity: 0;
            visibility: hidden;
        }

        .dock-item {
            position: relative;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            border-radius: 50%; 
            cursor: pointer;
            transition: var(--transition-premium);
            color: var(--icon-idle);
            pointer-events: auto;
        }

        .dock-toggle {
            margin-top: 8px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid var(--border-white);
            background: rgba(255,255,255,0.08);
            color: var(--pure-white);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition-premium);
            pointer-events: auto;
            position: relative;
            overflow: hidden;
        }

        .dock-toggle:hover {
            background: rgba(255,255,255,0.16);
        }

        .dock-toggle::before {
            content: '';
            display: block;
            width: 12px;
            height: 12px;
            border-right: 2px solid currentColor;
            border-bottom: 2px solid currentColor;
            transform: rotate(45deg);
            transition: transform var(--transition-premium), border-color var(--transition-premium);
        }

        .dock-wrapper.hidden .dock-toggle::before {
            transform: rotate(-135deg);
        }

        .dock-wrapper.hidden .dock-toggle {
            background: var(--pure-white);
            color: var(--pure-black);
        }

        .dock-item i {
            width: 20px;
            height: 20px;
            stroke-width: 2px;
        }

        /* HOVER: Branco Puro e leve subida */
        .dock-item:hover {
            color: var(--pure-white);
            transform: translateY(-2px);
        }

        /* ATIVO: Inversão Binária Redonda */
        .dock-item.active {
            background: var(--pure-white);
            color: var(--pure-black);
            transform: scale(0.9);
        }

        /* NOVO TOOLTIP PÍLULA PREMIUM - REFORMULADO */
        .tooltip {
            position: absolute;
            top: -48px; /* Mais alto para não encostar na Dock */
            left: 50%;
            transform: translateX(-50%) translateY(8px); /* Escondido */
            background: var(--pure-black); /* Preto Puro */
            color: var(--pure-white); /* Texto Branco */
            padding: 5px 14px; /* Mais largo para o formato pílula */
            border-radius: 50px; /* Micro Pílula */
            font-size: 0.6rem; /* Texto menor e discreto */
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px; /* Espaçamento premium entre letras */
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s var(--transition-premium), transform 0.2s var(--transition-premium);
            border: 1px solid var(--border-white); /* Borda discreta branca */
            box-shadow: 0 8px 15px rgba(0,0,0,0.7);
            white-space: nowrap; /* Não quebra linha */
            z-index: 10000;
        }

        .dock-item:hover .tooltip {
            opacity: 1;
            transform: translateX(-50%) translateY(0px); /* Flutua para cima */
        }

        @media (max-width: 700px) {
            .dock-container {
                gap: 5px;
                padding: 8px 10px;
            }

            .dock-item, .dock-toggle {
                width: 38px;
                height: 38px;
            }

            .dock-item i, .dock-toggle i {
                width: 16px;
                height: 16px;
            }
        }

        @media (max-width: 500px) {
            .dock-container {
                gap: 4px;
                max-width: calc(100vw - 20px);
            }

            .tooltip {
                font-size: 0.55rem;
            }
        }

    </style>
</head>
<body>

    <div class="main-container">
        <iframe id="frame" src="tools/tela-inicial.html"></iframe>
    </div>

    <div class="dock-wrapper" id="dockWrapper">
        <nav class="dock-container" id="dock">
            <button class="dock-item active" onclick="abrir('tools/tela-inicial.html', this)">
                <i data-lucide="home"></i>
                <span class="tooltip">Início</span>
            </button>
        <button class="dock-item" onclick="abrir('tools/mascara.html', this)">
            <i data-lucide="folder"></i>
            <span class="tooltip">Mascaras</span>
        </button>
        <button class="dock-item" onclick="abrir('tools/central_script.html', this)">
            <i data-lucide="pen-tool"></i>
            <span class="tooltip">Central de Texto</span>
        </button>   
        <button class="dock-item" onclick="abrir('tools/controle.html', this)">
            <i data-lucide="settings"></i>
            <span class="tooltip">Controle</span>
        </button>
        <button class="dock-item" onclick="abrir('tools/buscador_siglas_v4.html', this)">
            <i data-lucide="search"></i>
            <span class="tooltip">CSL</span>
        </button>
        <button class="dock-item" onclick="abrir('tools/torpedo.html', this)">
            <i data-lucide="send"></i>
            <span class="tooltip">Torpedos</span>
        </button>
        <button class="dock-item" onclick="abrir('tools/calculadora.html', this)">
            <i data-lucide="calculator"></i>
            <span class="tooltip">Calculadora</span>
        </button>
        <button class="dock-item" onclick="abrir('tools/dashboard-sir.html', this)">
            <i data-lucide="chart"></i>
            <span class="tooltip">Dashboard</span>
        </button>
        </nav>

        <button class="dock-toggle" id="dockToggle" onclick="toggleDock()" aria-label="Mostrar ou ocultar barra de tarefas"></button>
    </div>

    <script>
        lucide.createIcons();

        function abrir(pagina, elemento) {
            document.querySelectorAll('.dock-item').forEach(btn => btn.classList.remove('active'));
            if(elemento) elemento.classList.add('active');

            const frame = document.getElementById("frame");
            frame.src = pagina;
        }

        function toggleDock() {
            const wrapper = document.getElementById('dockWrapper');
            wrapper.classList.toggle('hidden');
        }
    </script>
</body>
</html>
