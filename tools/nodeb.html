<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Consulta NodeB - Ecossistema Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #000000;
            --bg-card: rgba(10, 10, 10, 0.6);
            --border-glass: #1A1A1A;
            --border-hover: #333333;
            --text-main: #FFFFFF;
            --text-sec: #888888;
            --transition-smooth: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            /* Textura discreta de pontos */
            background-image: radial-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px);
            background-size: 24px 24px;
            color: var(--text-main);
            padding: 40px 20px;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        .header-title {
            text-align: center;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 40px;
            font-size: 1.8rem;
            letter-spacing: -1px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Card Glassmorphism Subtil */
        .card { 
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: 16px; 
            padding: 32px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            transition: var(--transition-smooth);
        }

        .card h2 {
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--text-main);
            margin-top: 0;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.5px;
        }

        /* Área de Busca */
        .search-area {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }

        .search-input {
            flex-grow: 1;
            background: #050505;
            border: 1px solid var(--border-glass);
            color: var(--text-main);
            border-radius: 12px;
            padding: 16px 20px;
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            font-size: 1rem;
            transition: var(--transition-smooth);
        }

        .search-input::placeholder { color: var(--text-sec); }

        .search-input:focus {
            outline: none;
            border-color: var(--text-main);
            background: #000000;
        }

        /* Hierarquia Táctil: Botões que parecem físicos */
        .btn {
            background: var(--text-main);
            color: #000000;
            border: none;
            padding: 0 32px;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 800;
            cursor: pointer;
            transition: var(--transition-smooth);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 0 #555555; /* Borda inferior para profundidade */
            transform: translateY(0);
        }

        .btn:hover { background: #E0E0E0; }

        .btn:active {
            transform: translateY(4px); /* Afunda ao clicar */
            box-shadow: 0 0 0 transparent;
        }

        /* Lista de Resultados Auto */
        .lista {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .item {
            display: flex;
            align-items: center;
            background: transparent;
            border: 1px solid var(--border-glass);
            padding: 16px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition-smooth);
            font-weight: 300;
            font-size: 0.85rem;
            color: var(--text-sec);
        }

        .item b {
            font-weight: 800;
            color: var(--text-main);
            margin-right: 16px;
            font-size: 1.1rem;
            letter-spacing: -0.5px;
        }

        .item:hover {
            border-color: var(--text-main);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-main);
            transform: translateX(8px);
        }

        /* Card de Resultado Fixo */
        .resultado {
            display: none;
            border-color: var(--border-hover);
        }

        .resultado-titulo {
            font-weight: 800;
            font-size: 2.2rem;
            color: var(--text-main);
            margin: 0 0 20px 0;
            letter-spacing: -1.5px;
        }

        .resultado-dado {
            margin: 12px 0;
            font-size: 0.85rem;
            color: var(--text-sec);
            font-weight: 300;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .resultado-dado b { 
            color: var(--text-main); 
            text-transform: uppercase; 
            font-size: 0.65rem; 
            letter-spacing: 2px; 
            font-weight: 800;
        }

        /* Estado Concluído (Blur e Redução de Opacidade) */
        .btn.completed {
            background: #111111 !important;
            color: var(--text-main) !important;
            box-shadow: 0 0 0 transparent !important;
            transform: translateY(4px) !important;
            opacity: 0.3;
            filter: blur(0.5px);
            pointer-events: none; /* Evita cliques repetidos enquanto no estado concluído */
        }

        /* Partículas CSS via JS */
        .particle {
            position: fixed;
            background: #FFFFFF;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
        }

        /* Scrollbar Discreta */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-sec); }
    </style>
</head>

    /* BUSCA AUTOMÁTICA (Ao digitar) */
    function buscarAuto() {
        let texto = document.getElementById("busca").value.toUpperCase();
        let lista = document.getElementById("lista");
        
        lista.innerHTML = "";
        document.getElementById("resultado").style.display = "none";

        if(texto.length < 2) return;

        let resultados = dados.filter(d => 
            d.NODEB.includes(texto) || 
            d.ENDERECO.toUpperCase().includes(texto) || 
            d.CIDADE.toUpperCase().includes(texto)
        );

        resultados.slice(0, 5).forEach(r => {
            let div = document.createElement("div");
            div.className = "item";
            div.innerHTML = `<b>${r.NODEB}</b> <span>${r.ENDERECO}</span>`;
            div.onclick = () => mostrar(r);
            lista.appendChild(div);
        });
    }

    /* BUSCA BOTÃO (Ou Enter) */
    function buscar() {
        let texto = document.getElementById("busca").value.toUpperCase();
        
        let r = dados.find(d => 
            d.NODEB.includes(texto) || 
            d.ENDERECO.toUpperCase().includes(texto)
        );

        if(r) {
            mostrar(r);
        } else {
            // Em vez de um alert intrusivo, limpa a lista se nada for encontrado
            document.getElementById("lista").innerHTML = `<div class="item" style="justify-content:center; color: #555;">Nenhum registro encontrado.</div>`;
            document.getElementById("resultado").style.display = "none";
        }
    }

    /* MOSTRAR RESULTADO ESTRUTURADO */
    function mostrar(r) {
        let box = document.getElementById("resultado");
        box.style.display = "block";
        document.getElementById("lista").innerHTML = ""; 

        box.innerHTML = `
            <div class="resultado-titulo">${r.NODEB}</div>
            <div class="resultado-dado"><b>Endereço</b> <span>${r.ENDERECO}</span></div>
            <div class="resultado-dado"><b>Cidade</b> <span>${r.CIDADE}</span></div>
            
            <button class="btn" id="btnCopiar" style="margin-top: 32px;" onclick="copiar('${r.ENDERECO}', 'btnCopiar', event)">
                COPIAR ENDEREÇO
            </button>
        `;
    }

    /* COPIAR COM FEEDBACK DE DOPAMINA E ESTADO CONCLUÍDO */
    function copiar(texto, btnId, event) {
        navigator.clipboard.writeText(texto).then(() => {
            const btn = document.getElementById(btnId);
            
            // Ativa o estado "Concluído" (Blur + Opacidade reduzida)
            btn.classList.add('completed');
            btn.innerHTML = `COPIADO`;
            
            // Gera as partículas na posição do clique
            createParticles(event.clientX, event.clientY);
            
            // Retorna ao estado normal suavemente
            setTimeout(() => {
                btn.classList.remove('completed');
                btn.innerHTML = `COPIAR ENDEREÇO`;
            }, 2000);
        });
    }

    /* SISTEMA DE PARTÍCULAS (Feedback Visual) */
    function createParticles(x, y) {
        const particleCount = 15; // Quantidade de partículas
        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            document.body.appendChild(particle);

            // Tamanho aleatório
            const size = Math.random() * 4 + 2; 
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;

            // Posição inicial (no cursor)
            particle.style.left = `${x}px`;
            particle.style.top = `${y}px`;

            // Ângulo e velocidade aleatórios
            const angle = Math.random() * Math.PI * 2;
            const velocity = 30 + Math.random() * 50;
            const tx = Math.cos(angle) * velocity;
            const ty = Math.sin(angle) * velocity - 20; // Gravidade leve para cima

            // Animação Web Animations API
            particle.animate([
                { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0)`, opacity: 0 }
            ], {
                duration: 600 + Math.random() * 300,
                easing: 'cubic-bezier(0.25, 1, 0.5, 1)'
            }).onfinish = () => {
                particle.remove(); // Limpa do DOM
            };
        }
    }
